id = 1
title = "Day 1: Inventory Check"
instructions = """
The web runs on HTTP. Every time your browser loads a page, fetches data,
or checks for updates — it's making a GET request. GET is the most fundamental
HTTP method: ask the server for something, get a response back. curl lets you
do the same thing from your terminal, without a browser.

---

Briefing:
You landed a job at a grocery store thanks to your “tech skills.”

Day 1 of training:
The manager points at a terminal.
"Our inventory’s in there. Go find it."
No further instructions.

A server is running at http://localhost:8080.

Available endpoints:
  GET  /inventory       — List all inventory items

Your mission:
  1. Fetch the list of items using a GET request
  2. Find the item whose name starts with the letter 'B'
  3. Type that item's name in the answer box and submit

---

"""
solutions = [
    """curl http://localhost:8080/inventory""",
]

submit_prompt = "Which item's name starts with 'B'?"

[setup]
seed = [
    "CREATE TABLE IF NOT EXISTS inventory (id INTEGER PRIMARY KEY AUTOINCREMENT, name TEXT NOT NULL, price REAL NOT NULL)",
    "INSERT INTO inventory (name, price) VALUES ('Apples', 1.20)",
    "INSERT INTO inventory (name, price) VALUES ('Bananas', 0.80)",
    "INSERT INTO inventory (name, price) VALUES ('Milk', 2.50)",
]

[server]
port = 8080

[verify.input]
contains = ["Bananas", "bananas"]
error = "That's not right. Look for the item whose name starts with 'B'."
